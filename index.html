<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Web Space Dragon — an endless runner browser game inspired by Chrome's offline dinosaur game. Jump over obstacles in deep space!">
    <meta name="keywords" content="space dragon, browser game, endless runner, chrome dinosaur, HTML5 game">
    <meta name="author" content="AlgorithmicMind">
    <meta name="theme-color" content="#050510">
    <title>Web Space Dragon | Endless Runner Browser Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="game-wrapper">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>

            <!-- HUD Layer (always visible during play) -->
            <div id="hud">
                <div id="hud-left">
                    <span id="speed-label">SPD</span>
                    <span id="speed-value">1.0x</span>
                </div>
                <div id="hud-right">
                    <div id="high-score-display">HI <span id="high-score">00000</span></div>
                    <div id="score-display"><span id="score">00000</span></div>
                </div>
            </div>

            <!-- Start Screen Overlay -->
            <div id="start-screen" class="overlay active">
                <div class="overlay-content">
                    <h1 id="game-title">WEB SPACE<br>DRAGON</h1>
                    <p class="tagline">Navigate the cosmic void. Avoid the asteroids.</p>
                    <div class="start-prompt pulse">
                        <span class="key-hint">SPACE</span> or <span class="key-hint">CLICK</span> to launch
                    </div>
                    <p class="controls-hint">↑ Arrow also works &bull; Touch supported</p>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div id="gameover-screen" class="overlay">
                <div class="overlay-content">
                    <h2 id="gameover-title">GAME OVER</h2>
                    <div class="final-stats">
                        <div class="stat-item">
                            <span class="stat-label">SCORE</span>
                            <span class="stat-value" id="final-score">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">BEST</span>
                            <span class="stat-value" id="final-high-score">0</span>
                        </div>
                    </div>
                    <div id="new-record" class="new-record hidden">🏆 NEW RECORD!</div>
                    <div class="start-prompt pulse">
                        <span class="key-hint">SPACE</span> or <span class="key-hint">CLICK</span> to retry
                    </div>
                </div>
            </div>
        </div>

        <footer id="game-footer">
            <span>Web Space Dragon &copy; 2026 AlgorithmicMind</span>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
